services:
  postgres:
    image: postgres:17-alpine
    ports:
      # Host-side 54322 by default to avoid clashing with a system Postgres
      # that's commonly already bound to 5432. Container-side stays on 5432.
      # Override with POSTGRES_PORT=5432 if you want the default Postgres port.
      - "${POSTGRES_PORT:-54322}:5432"
    environment:
      POSTGRES_USER: bastion
      POSTGRES_PASSWORD: bastion
      POSTGRES_DB: bastion
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
