name: PR merge housekeeping

on:
  pull_request:
    types: [closed]
    branches: [dev, main]

jobs:
  housekeeping:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
      - name: Parse referenced issues
        id: parse-issues
        uses: actions/github-script@v7
        with:
          script: |
            const head = context.payload.pull_request.head;
            const baseRepo = context.payload.pull_request.base.repo.full_name;
            if (head.repo.full_name !== baseRepo) {
              console.log(`Skipping: fork PR (${head.repo.full_name})`);
              core.setOutput('issues', '[]');
              return;
            }
            const body = context.payload.pull_request.body || '';
            const pattern = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const matches = [...body.matchAll(pattern)];
            const issueNumbers = [...new Set(matches.map(m => parseInt(m[1], 10)))];
            core.setOutput('issues', JSON.stringify(issueNumbers));

      - name: Close referenced issues
        if: steps.parse-issues.outputs.issues != '[]'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumbers = JSON.parse('${{ steps.parse-issues.outputs.issues }}');
            for (const issue_number of issueNumbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number
                });
                if (issue.pull_request) {
                  console.log(`Skipping #${issue_number} (pull request, not issue)`);
                  continue;
                }
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                  state: 'closed',
                  state_reason: 'completed'
                });
                console.log(`Closed issue #${issue_number}`);
              } catch (error) {
                console.log(`Failed to close #${issue_number}: ${error.message}`);
              }
            }

      - name: Set end date on project items
        if: steps.parse-issues.outputs.issues != '[]'
        uses: actions/github-script@v7
        env:
          PROJECT_ID: PVT_kwHOBh2HNc4BQvpy
          END_DATE_FIELD_ID: PVTF_lAHOBh2HNc4BQvpyzg-xqJQ
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const issueNumbers = JSON.parse('${{ steps.parse-issues.outputs.issues }}');
            const mergeDate = context.payload.pull_request.merged_at.split('T')[0];
            const projectId = process.env.PROJECT_ID;
            const fieldId = process.env.END_DATE_FIELD_ID;
            for (const issue_number of issueNumbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number
                });
                if (issue.pull_request) {
                  console.log(`Skipping #${issue_number} (pull request)`);
                  continue;
                }
                const result = await github.graphql(`
                  query($nodeId: ID!) {
                    node(id: $nodeId) {
                      ... on Issue {
                        projectItems(first: 10) {
                          nodes { id project { id } }
                        }
                      }
                    }
                  }
                `, { nodeId: issue.node_id });
                const items = result.node.projectItems.nodes;
                const projectItem = items.find(i => i.project.id === projectId);
                if (!projectItem) {
                  console.log(`#${issue_number} not in project, skipping`);
                  continue;
                }
                await github.graphql(`
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $date: Date!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $projectId
                      itemId: $itemId
                      fieldId: $fieldId
                      value: { date: $date }
                    }) { projectV2Item { id } }
                  }
                `, {
                  projectId,
                  itemId: projectItem.id,
                  fieldId,
                  date: mergeDate
                });
                console.log(`Set end date ${mergeDate} on #${issue_number}`);
              } catch (error) {
                console.log(`Failed to update #${issue_number}: ${error.message}`);
              }
            }

      - name: Delete feature branch
        uses: actions/github-script@v7
        with:
          script: |
            const head = context.payload.pull_request.head;
            const baseRepo = context.payload.pull_request.base.repo.full_name;
            if (head.repo.full_name !== baseRepo) {
              console.log(`Skipping deletion: ${head.ref} (fork: ${head.repo.full_name})`);
              return;
            }
            const branch = head.ref;
            const prefixes = ['feat/', 'fix/', 'refactor/', 'docs/', 'chore/', 'test/', 'hotfix/'];
            if (!prefixes.some(p => branch.startsWith(p))) {
              console.log(`Skipping deletion: ${branch} (no matching prefix)`);
              return;
            }
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`
              });
              console.log(`Deleted branch: ${branch}`);
            } catch (error) {
              console.log(`Failed to delete ${branch}: ${error.message}`);
            }
